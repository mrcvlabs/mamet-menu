<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Antep Sofrası Kebapçı Mam-Et | Dijital Menü</title>
    <meta
      name="description"
      content="Antep Sofrası Kebapçı Mam-Et dijital menü. Güncel fiyatlar ve hızlı arama."
    />
    <meta property="og:title" content="Antep Sofrası Kebapçı Mam-Et | Dijital Menü" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="tr_TR" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0f12;
        --bg-soft: #12161c;
        --card: #171c24;
        --card-strong: #1d2430;
        --text: #f4f1ea;
        --muted: #b6b2a8;
        --accent: #d6b36a;
        --accent-strong: #f0c977;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Cinzel", "Playfair Display", "Times New Roman", serif;
        background: radial-gradient(circle at top, #1c1f26, var(--bg) 45%);
        color: var(--text);
        min-height: 100vh;
      }

      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 18px 40px;
      }

      header.hero {
        background: linear-gradient(135deg, rgba(214, 179, 106, 0.08), rgba(18, 22, 28, 0.85));
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      header.hero::after {
        content: "";
        position: absolute;
        right: -120px;
        top: -140px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(240, 201, 119, 0.35), transparent 70%);
        filter: blur(6px);
      }

      .brand h1 {
        margin: 0 0 6px;
        font-size: clamp(1.6rem, 3.2vw, 2.4rem);
        letter-spacing: 0.04em;
      }

      .brand p {
        margin: 0 0 18px;
        color: var(--muted);
        font-family: "Cormorant Garamond", "Georgia", serif;
        font-size: 1rem;
      }

      .meta {
        display: grid;
        gap: 10px;
        font-size: 0.95rem;
      }

      .meta a {
        color: var(--accent-strong);
        text-decoration: none;
        font-weight: 600;
      }

      .meta a.address {
        display: inline-block;
        transition: color 0.2s ease;
      }

      .meta a.address:hover {
        color: #ffe0a0;
      }

      .meta span {
        color: var(--muted);
        font-family: "Cormorant Garamond", "Georgia", serif;
      }

      .sticky-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 16px 0 10px;
        background: linear-gradient(180deg, rgba(13, 15, 18, 0.98), rgba(13, 15, 18, 0.6));
        backdrop-filter: blur(8px);
      }

      .tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 8px;
        scrollbar-width: none;
      }

      .tabs::-webkit-scrollbar {
        display: none;
      }

      .tab-btn {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 0.9rem;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .tab-btn.active,
      .tab-btn:hover {
        background: var(--accent);
        color: #1a1a1a;
        border-color: rgba(240, 201, 119, 0.4);
      }

      .search {
        margin-top: 12px;
      }

      .search-actions {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr;
      }

      .search input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--card-strong);
        color: var(--text);
        font-family: "Cormorant Garamond", "Georgia", serif;
        font-size: 1rem;
      }

      .pdf-btn {
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .pdf-btn:hover {
        background: var(--accent);
        color: #1a1a1a;
        border-color: rgba(240, 201, 119, 0.4);
      }

      @media (max-width: 720px) {
        .search-actions {
          grid-template-columns: 1fr;
        }
      }

      main {
        display: grid;
        gap: 20px;
        margin-top: 16px;
      }

      section.category {
        background: var(--card);
        border-radius: 20px;
        padding: 18px;
        border: 1px solid var(--border);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.3);
      }

      .category h2 {
        margin: 0 0 12px;
        font-size: clamp(1.1rem, 2.6vw, 1.5rem);
        color: var(--accent-strong);
        letter-spacing: 0.02em;
      }

      .item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .item:last-child {
        border-bottom: none;
      }

      .item-name {
        font-family: "Cormorant Garamond", "Georgia", serif;
        font-size: 1rem;
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .item-note {
        margin-top: 4px;
        font-size: 0.85rem;
        color: var(--accent);
      }

      .item-price {
        font-weight: 700;
        color: var(--accent-strong);
        font-size: 1rem;
        font-family: "Cinzel", "Playfair Display", serif;
      }

      footer {
        margin-top: 24px;
        text-align: center;
        color: var(--muted);
        font-size: 0.9rem;
        padding-bottom: 24px;
      }

      footer a {
        color: var(--accent-strong);
        text-decoration: none;
        font-weight: 600;
      }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 20px;
        border: 1px dashed var(--border);
        border-radius: 16px;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@400;600&display=swap"
    />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="brand">
          <h1>Antep Sofrası Kebapçı Mam-Et</h1>
          <p>Premium dijital menü</p>
          <div class="meta">
            <a href="tel:05013241601">0501 324 1601</a>
            <span>Çalışma: 10:00–04:00</span>
            <a
              class="address"
              href="https://www.google.com/maps/search/?api=1&query=Demirta%C5%9F%20Cumhuriyet%201%2C%20Osmangazi%20Cd.%20No%3A%2095%2FA%2C%2016190%20Osmangazi%20Bursa"
              target="_blank"
              rel="noopener"
            >
              Demirtaş Cumhuriyet Mh. Osmangazi Cd. No: 95/A, 16190 Osmangazi / Bursa (25. Noter sırasında)
            </a>
            <span>Bursa / Osmangazi / Demirtaş</span>
          </div>
        </div>
      </header>

      <div class="sticky-bar">
        <div class="tabs" id="categoryTabs"></div>
        <div class="search">
          <div class="search-actions">
            <input type="search" id="searchInput" placeholder="Menüde ara..." autocomplete="off" />
            <button id="pdfBtn" class="pdf-btn" type="button">PDF İndir</button>
          </div>
        </div>
      </div>

      <main id="menuRoot"></main>

      <footer>
        Gece Dürüm: Dürüm yanında ayran ikram.
        <span> | </span>
        <a href="tel:05013241601">0501 324 1601</a>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script>
      const menuRoot = document.getElementById("menuRoot");
      const tabsRoot = document.getElementById("categoryTabs");
      const searchInput = document.getElementById("searchInput");
      const pdfBtn = document.getElementById("pdfBtn");
      let fullMenu = [];

      const formatter = new Intl.NumberFormat("tr-TR", {
        style: "currency",
        currency: "TRY",
        maximumFractionDigits: 2,
      });

      function formatPrice(value) {
        return formatter.format(Number(value || 0));
      }

      const CATEGORY_ORDER = [
        "Gece Dürüm",
        "Kebap Çeşitleri",
        "Pide Çeşitleri",
        "Lahmacunlar",
        "Dürüm Çeşitleri",
        "Mezeler",
        "Tatlı Çeşitleri",
        "İçecekler",
      ];

      function normalizeKey(text) {
        const raw = String(text || "");
        return raw
          .toLowerCase()
          .replaceAll("i̇", "i")
          .replaceAll("İ", "i")
          .replaceAll("I", "i")
          .replaceAll("ı", "i")
          .replaceAll("ş", "s")
          .replaceAll("ğ", "g")
          .replaceAll("ü", "u")
          .replaceAll("ö", "o")
          .replaceAll("ç", "c");
      }

      function mapCategoryName(raw) {
        const norm = normalizeKey(raw);
        if (!norm) return null;
        if (norm.includes("corba")) return null;

        if (norm.includes("gece")) return CATEGORY_ORDER[0];
        if (norm.includes("kebap")) return CATEGORY_ORDER[1];
        if (norm.includes("pide")) return CATEGORY_ORDER[2];
        if (norm.includes("lahmacun")) return CATEGORY_ORDER[3];
        if (norm.includes("durum")) return CATEGORY_ORDER[4];
        if (norm.includes("meze")) return CATEGORY_ORDER[5];
        if (norm.includes("tatli")) return CATEGORY_ORDER[6];
        if (norm.includes("icecek")) return CATEGORY_ORDER[7];
        return null;
      }

      function shouldSkipCategory(norm, mapped) {
        if (mapped !== CATEGORY_ORDER[1] && mapped !== CATEGORY_ORDER[2]) {
          return false;
        }
        const hasPortion =
          norm.includes("(1,5)") ||
          norm.includes("1,5") ||
          norm.includes("1.5") ||
          norm.includes("porsiyon") ||
          norm.includes("az");
        return hasPortion;
      }

      function normalizeItem(item) {
        const name =
          item.name ||
          item.isim ||
          item["İsim"] ||
          item["isim"] ||
          item["İSİM"] ||
          item["ISIM"] ||
          "";
        const price = item.price ?? item.fiyat;
        return {
          name: String(name || "").trim(),
          price: Number(price ?? 0),
        };
      }

      function buildMenuFromObject(data) {
        const buckets = new Map();
        CATEGORY_ORDER.forEach((key) => buckets.set(key, []));

        Object.entries(data || {}).forEach(([rawCategory, items]) => {
          const norm = normalizeKey(rawCategory);
          const mapped = mapCategoryName(rawCategory);
          if (!mapped || !Array.isArray(items)) return;
          if (shouldSkipCategory(norm, mapped)) return;
          const bucket = buckets.get(mapped) || [];
          items.forEach((item) => {
            const normalized = normalizeItem(item || {});
            if (!normalized.name) return;
            bucket.push(normalized);
          });
          buckets.set(mapped, bucket);
        });

        return CATEGORY_ORDER.reduce((acc, key) => {
          const items = buckets.get(key) || [];
          if (items.length) {
            acc.push({ name: key, items });
          }
          return acc;
        }, []);
      }

      function renderTabs(categories) {
        tabsRoot.innerHTML = "";
        categories.forEach((cat, idx) => {
          const btn = document.createElement("button");
          btn.className = "tab-btn";
          btn.textContent = cat.name;
          btn.addEventListener("click", () => {
            document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            const target = document.getElementById(`cat-${idx}`);
            if (target) {
              target.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          });
          tabsRoot.appendChild(btn);
        });
      }

      function renderMenu(categories, query) {
        menuRoot.innerHTML = "";
        const q = (query || "").trim().toLowerCase();
        let renderedCount = 0;

        categories.forEach((cat, idx) => {
          const items = cat.items.filter((item) => item.name.toLowerCase().includes(q));
          if (items.length === 0) {
            return;
          }
          renderedCount += items.length;
          const section = document.createElement("section");
          section.className = "category";
          section.id = `cat-${idx}`;

          const title = document.createElement("h2");
          title.textContent = cat.name;
          section.appendChild(title);

          items.forEach((item) => {
            const row = document.createElement("div");
            row.className = "item";

            const nameWrap = document.createElement("div");
            const name = document.createElement("div");
            name.className = "item-name";
            name.textContent = item.name;
            nameWrap.appendChild(name);

            if (cat.name === "Gece Dürüm") {
              const note = document.createElement("div");
              note.className = "item-note";
              note.textContent = "Ayran ikram";
              nameWrap.appendChild(note);
            }

            const price = document.createElement("div");
            price.className = "item-price";
            const formatted = formatPrice(item.price);
            price.textContent = `${formatted.replace("₺", "").trim()} ₺`;

            row.appendChild(nameWrap);
            row.appendChild(price);
            section.appendChild(row);
          });

          menuRoot.appendChild(section);
        });

        if (renderedCount === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "Aramanıza uygun ürün bulunamadı.";
          menuRoot.appendChild(empty);
        }
      }

      fetch("./menu.json")
        .then((res) => res.json())
        .then((data) => {
          fullMenu = buildMenuFromObject(data);
          renderTabs(fullMenu);
          renderMenu(fullMenu, "");
          const first = document.querySelector(".tab-btn");
          if (first) {
            first.classList.add("active");
          }
        })
        .catch(() => {
          menuRoot.innerHTML = '<div class="empty-state">Menü yüklenemedi.</div>';
        });

      searchInput.addEventListener("input", (e) => {
        renderMenu(fullMenu, e.target.value);
      });

      function buildPdfHeader() {
        const header = document.createElement("div");
        header.style.display = "grid";
        header.style.gap = "6px";
        header.style.marginBottom = "16px";
        header.style.fontFamily = "Times New Roman, serif";
        header.style.color = "#1a1a1a";

        const title = document.createElement("div");
        title.textContent = "Antep Sofrası Kebapçı Mam-Et";
        title.style.fontSize = "20px";
        title.style.fontWeight = "700";

        const line1 = document.createElement("div");
        line1.textContent = "0501 324 1601";

        const line2 = document.createElement("div");
        line2.textContent = "Çalışma: 10:00–04:00";

        const line3 = document.createElement("div");
        line3.textContent = "Demirtaş Cumhuriyet 1, Osmangazi Cd. No: 95/A, 16190 Osmangazi / Bursa";

        header.appendChild(title);
        header.appendChild(line1);
        header.appendChild(line2);
        header.appendChild(line3);
        return header;
      }

      async function downloadPdf() {
        if (!menuRoot || !window.html2canvas || !window.jspdf) return;
        const originalText = pdfBtn.textContent;
        pdfBtn.textContent = "Hazırlanıyor...";
        pdfBtn.disabled = true;

        const wrapper = document.createElement("div");
        wrapper.style.background = "#ffffff";
        wrapper.style.padding = "24px";
        wrapper.style.width = "794px";
        wrapper.style.boxSizing = "border-box";

        wrapper.appendChild(buildPdfHeader());
        wrapper.appendChild(menuRoot.cloneNode(true));

        document.body.appendChild(wrapper);
        wrapper.style.position = "fixed";
        wrapper.style.left = "-9999px";
        wrapper.style.top = "0";

        try {
          const canvas = await html2canvas(wrapper, {
            scale: 2,
            useCORS: true,
          });
          const imgData = canvas.toDataURL("image/png");
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF("p", "pt", "a4");
          const pageWidth = pdf.internal.pageSize.getWidth();
          const pageHeight = pdf.internal.pageSize.getHeight();
          const imgWidth = pageWidth;
          const imgHeight = (canvas.height * imgWidth) / canvas.width;
          let position = 0;
          let remainingHeight = imgHeight;

          while (remainingHeight > 0) {
            pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
            remainingHeight -= pageHeight;
            if (remainingHeight > 0) {
              pdf.addPage();
              position -= pageHeight;
            }
          }
          pdf.save("AntepSofrasi-MametMenu.pdf");
        } finally {
          wrapper.remove();
          pdfBtn.textContent = originalText;
          pdfBtn.disabled = false;
        }
      }

      pdfBtn.addEventListener("click", downloadPdf);

    </script>
  </body>
</html>
